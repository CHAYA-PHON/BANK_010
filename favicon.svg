<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#090514" />
    </radialGradient>
    
    <!-- Gold Coin Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Neon Indigo Gradient -->
    <linearGradient id="neonIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Neon Pink Gradient -->
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Intense Neon Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- iOS-style Rounded App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Subtle Grid/Radar lines for AI Scanner theme -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#312e81" stroke-width="2" stroke-dasharray="8,8" opacity="0.6" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#4338ca" stroke-width="1.5" opacity="0.4" />

  <!-- Scanning / Ledger Flow Lines (Neon Glow) -->
  <path d="M 120 340 L 220 340 A 36 36 0 0 1 256 376 L 256 420" fill="none" stroke="url(#neonIndigo)" stroke-width="8" stroke-linecap="round" filter="url(#neonGlow)" />
  <path d="M 392 172 L 292 172 A 36 36 0 0 1 256 136 L 256 92" fill="none" stroke="url(#neonPink)" stroke-width="8" stroke-linecap="round" filter="url(#neonGlow)" />

  <!-- Connecting data arcs -->
  <path d="M 100 210 C 130 150, 380 150, 412 210" fill="none" stroke="#6366f1" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  <path d="M 100 302 C 130 362, 380 362, 412 302" fill="none" stroke="#d946ef" stroke-width="4" stroke-linecap="round" opacity="0.3" />

  <!-- Outer Ring of the Gold Coin with Glow -->
  <circle cx="256" cy="256" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="12" filter="url(#glow)" />
  
  <!-- Main Shiny Gold Coin -->
  <circle cx="256" cy="256" r="76" fill="url(#goldGrad)" />
  
  <!-- Inner Coin Ridge -->
  <circle cx="256" cy="256" r="62" fill="none" stroke="#ffe066" stroke-width="3" opacity="0.5" />

  <!-- Beautiful Bold Thai Baht Symbol (฿) inside the Coin -->
  <text x="256" y="292" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="105" fill="#ffffff" text-anchor="middle" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.4))">฿</text>
  
  <!-- Futuristic AI Corner Dots to represent high tech / scanning -->
  <rect x="54" y="54" width="30" height="8" rx="4" fill="#6366f1" />
  <rect x="54" y="54" width="8" height="30" rx="4" fill="#6366f1" />
  
  <rect x="428" y="54" width="30" height="8" rx="4" fill="#6366f1" />
  <rect x="450" y="54" width="8" height="30" rx="4" fill="#6366f1" />

  <rect x="54" y="450" width="30" height="8" rx="4" fill="#d946ef" />
  <rect x="54" y="428" width="8" height="30" rx="4" fill="#d946ef" />

  <rect x="428" y="450" width="30" height="8" rx="4" fill="#d946ef" />
  <rect x="450" y="428" width="8" height="30" rx="4" fill="#d946ef" />
</svg>
